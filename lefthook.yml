# lefthook.yml
# INFRA-02 — D-19, D-20, D-21
# Pre-commit: lint staged TypeScript files, format, and type-check.
# commit-msg: enforce Conventional Commits format.
pre-commit:
  parallel: false
  commands:
    lint:
      glob: '*.{ts,js}'
      run: pnpm exec eslint --max-warnings 0 {staged_files}
    format:
      glob: '*.{ts,js}'
      run: pnpm exec prettier --write {staged_files} && git add {staged_files}
    typecheck:
      run: pnpm exec tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
